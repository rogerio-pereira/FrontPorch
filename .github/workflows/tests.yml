name: ci-pr

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/_lint-reusable.yml
    with:
      mode: check
    secrets: inherit

  tests:
    runs-on: ubuntu-latest
    needs: lint
    environment: Testing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (Node and Composer in parallel)
        run: |
          set -e
          (
            npm i
            npm install playwright@latest
            npx playwright install
          ) &
          (
            composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"
            composer install --no-interaction --prefer-dist --optimize-autoloader
          ) &
          wait

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Tests
        run: php artisan test --parallel --coverage --min=90

      - name: Type Coverage
        run: php artisan test --type-coverage --min=90 --parallel